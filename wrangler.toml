name = "ncm-api"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 账户配置
account_id = "6410342af5809a4c148a4536d8a7030a"

# Workers 设置
workers_dev = true

# KV 命名空间绑定（本地开发时注释掉，部署时取消注释并填入 ID）
# [[kv_namespaces]]
# binding = "NCM_KV"
# id = "your-kv-namespace-id"

# 环境变量
[vars]
NODE_ENV = "production"
ENABLE_FLAC = "true"
# 允许访问的域名（多个用逗号分隔，留空或不设置则允许所有域名）
# ALLOWED_ORIGINS = "https://example.com,https://admin.example.com"
# 指标密码（访问 /metrics 时需要）
# METRICS_PASSWORD = "your-secure-password"

# 生产环境配置
[env.production]
name = "ncm-api-prod"
workers_dev = false
# 生产环境 KV
# [[env.production.kv_namespaces]]
# binding = "NCM_KV"
# id = "your-production-kv-id"

# 生产环境变量
[env.production.vars]
NODE_ENV = "production"
ENABLE_FLAC = "true"

# 日志配置
[observability.logs]
enabled = true

# Cron Triggers（定时任务）
# 每小时清理一次缓存
[triggers]
crons = ["0 * * * *"]

# 开发环境配置
[env.dev]
name = "ncm-api-dev"
workers_dev = true

# Limits 配置
[limits]
cpu_ms = 50000  # CPU 时间限制 50 秒

# 构建配置
[build]
command = ""

# 路由配置（自定义域名）
# [[routes]]
# pattern = "api.example.com/*"
# zone_name = "example.com"

# [[routes]]
# pattern = "music.example.com/api/*"
# zone_name = "example.com"

#_placement = { mode = "smart" }

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"